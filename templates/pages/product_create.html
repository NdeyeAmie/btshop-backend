{% extends 'base.html' %}
{% load static %}

{% block content %}
<aside class="right-side">
    <section class="content-header">
        <h1>Produits <small>Ajouter</small></h1>
        <ol class="breadcrumb">
            <li><a href="{% url 'dash_admin:dashboard' %}"><i class="fa fa-dashboard"></i> Home</a></li>
            <li><a href="{% url 'dash_admin:product_list' %}">Produits</a></li>
            <li class="active">Ajouter</li>
        </ol>
    </section>

    <section class="content">
        <div class="row">
            <div class="col-md-8 col-md-offset-2">
                <div class="box box-primary">
                    <div class="box-header">
                        <h3 class="box-title">Nouveau produit</h3>
                    </div>
                    <div class="box-body">
                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}

                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="form-group">
                                <label>Titre</label>
                                <input type="text" name="title" class="form-control" placeholder="Titre du produit" required>
                            </div>
                            <div class="form-group">
        <label>Image principale</label>
        <input type="file" name="img" class="form-control" accept="image/*">
        <small class="text-muted">JPG, PNG, WEBP acceptés</small>
    </div>
    
    <div class="form-group">
        <label>Image hover</label>
        <input type="file" name="hover_img" class="form-control" accept="image/*">
    </div>
                            <div class="form-group">
                                <label>Description</label>
                                <textarea name="desc" class="form-control" rows="3" placeholder="Description..."></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Prix (FCFA)</label>
                                        <input type="number" name="price" class="form-control" placeholder="10000" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Stock</label>
                                        <input type="number" name="count_in_stock" class="form-control" placeholder="10" required>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Genre</label>
                                        <select name="genre" class="form-control" required>
                                            <option value="">-- Choisir --</option>
                                            <option value="elle">Elle</option>
                                            <option value="lui">Lui</option>
                                            <option value="mixte">Mixte</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
    <div class="form-group">
        <label>Fragrances</label>
        <select name="fragrances" class="form-control" multiple>
            {% for fragrance in fragrances %}
            <option value="{{ fragrance.id }}">{{ fragrance.name }}</option>
            {% empty %}
            <option disabled>Aucune fragrance — ajoutez-en d'abord</option>
            {% endfor %}
        </select>
        <small class="text-muted">
            Ctrl+Click pour plusieurs | 
            <a href="{% url 'dash_admin:fragrance_list' %}" target="_blank">
                <i class="fa fa-plus"></i> Gérer les fragrances
            </a>
        </small>
    </div>
</div>
                            </div>
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" name="featured"> Produit en vedette (Featured)
                                </label>
                            </div>
                            <div class="box-footer">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fa fa-save"></i> Enregistrer
                                </button>
                                <a href="{% url 'dash_admin:product_list' %}" class="btn btn-default">
                                    <i class="fa fa-times"></i> Annuler
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</aside>
{% endblock %}
